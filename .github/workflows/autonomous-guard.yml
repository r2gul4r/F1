name: autonomous-guard

on:
  push:
    branches:
      - main
      - codex/**
  pull_request:

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify control files
        run: |
          test -f PLAN.md
          test -f TASKS.md
          test -f ARCHITECTURE.md
          test -f CHANGELOG.md

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Deployment smoke check tests
        shell: pwsh
        run: |
          $pesterV5 = Get-Module -ListAvailable Pester | Where-Object { $_.Version.Major -ge 5 } | Sort-Object Version -Descending | Select-Object -First 1
          if (-not $pesterV5) {
            Install-Module -Name Pester -MinimumVersion 5.0.0 -Scope CurrentUser -Force -SkipPublisherCheck
          }
          Import-Module Pester -MinimumVersion 5.0.0 -Force
          $result = Invoke-Pester -Path scripts/deployment/tests/smoke-check.tests.ps1 -PassThru
          if ($result.FailedCount -gt 0) {
            throw "Deployment smoke check tests failed"
          }
