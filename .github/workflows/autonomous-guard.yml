name: autonomous-guard

on:
  push:
    branches:
      - main
      - codex/**
  pull_request:

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify control files
        run: |
          test -f PLAN.md
          test -f TASKS.md
          test -f ARCHITECTURE.md
          test -f CHANGELOG.md

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
