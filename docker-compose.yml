version: "3.9"
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: f1pulse
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7-alpine

  ollama:
    image: ollama/ollama:latest

  realtime:
    build:
      context: .
      dockerfile: apps/realtime/Dockerfile
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - ollama
    ports:
      - "127.0.0.1:4001:4001"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "const http=require('http');const req=http.get('http://127.0.0.1:4001/healthz',res=>process.exit(res.statusCode===200?0:1));req.on('error',()=>process.exit(1));req.setTimeout(3000,()=>{req.destroy();process.exit(1);});"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    env_file:
      - .env
    depends_on:
      realtime:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file:
      - .env
    depends_on:
      realtime:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  postgres-data:
